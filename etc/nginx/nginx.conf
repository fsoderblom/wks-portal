user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format main   '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    log_format main_ext '$remote_addr - $auth_email [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" user=$auth_user';


    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    include /etc/nginx/conf.d/*.conf;

    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  openpgpkey.domain.cc;
        return 301 https://$host$request_uri;
    }

    server {
        listen       443 ssl http2 default_server;
        listen       [::]:443 ssl http2 default_server;
        server_name  openpgpkey.domain.cc;
#       root         /var/lib/gnupg/wks;

        ssl_certificate "/etc/pki/nginx/server.crt";
        ssl_certificate_key "/etc/pki/nginx/private/server.key";
        ssl_session_cache shared:SSL_WKD:1m;
        ssl_session_timeout  10m;
        ssl_ciphers PROFILE=SYSTEM;
        ssl_prefer_server_ciphers on;

        location ^~ /.well-known/openpgpkey/domain.cc/ {
            alias /var/lib/gnupg/wks/domain.cc/;
            default_type application/octet-stream;
            add_header Access-Control-Allow-Origin "*" always;
            types { }
            try_files $uri @plain404;
        }

        location @plain404 {
            default_type text/plain;
            return 404 "Not Found\n";
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name wks-portal.internal.domain.cc;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name wks-portal.internal.domain.cc;

        ssl_certificate "/etc/pki/nginx/wks-portal.internal.domain.cc.crt";
        ssl_certificate_key "/etc/pki/nginx/private/wks-portal.internal.domain.cc.key";
        ssl_session_cache shared:SSL_PORTAL:10m;
        ssl_session_timeout 10m;
        ssl_ciphers PROFILE=SYSTEM;
        ssl_prefer_server_ciphers on;

        access_log  /var/log/nginx/wks-portal.internal.domain.cc.access.log  main_ext;
        error_log /var/log/nginx/wks-portal.internal.domain.cc.error.log;

        allow 10.0.0.0/8;
        deny all;

        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;

        location /oauth2/ {
            proxy_pass http://127.0.0.1:4180;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 32k;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /oauth2/auth {
            proxy_pass http://127.0.0.1:4180;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 32k;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Content-Length "";
            proxy_pass_request_body off;
        }

        location / {
            auth_request /oauth2/auth;
            error_page 401 = /oauth2/sign_in;
            auth_request_set $auth_user  $upstream_http_x_auth_request_user;
            auth_request_set $auth_email $upstream_http_x_auth_request_email;
            proxy_set_header X-User $auth_email;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://127.0.0.1:9010;
        }
    }
}
